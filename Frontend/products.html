<div class="products-toolbar">
  <div class="category-tabs product-tabs">
    <button class="tab active" onclick="loadAllProducts(this)">All</button>

  <div class="search-wrap">
    <input
      type="text"
      id="search"
      placeholder="Search product..."
      onkeyup="searchProducts()"
    />
    <button class="search-btn" type="button" onclick="searchProducts()" aria-label="Search">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
      </svg>
    </button>
  </div>
</div>
