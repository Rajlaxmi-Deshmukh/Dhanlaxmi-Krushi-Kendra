<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <link rel="icon" type="image/png" href="logo.png">
<title>Sign Up | Dhanalaxmi Krushi Kendra</title>
<link rel="stylesheet" href="styles.css">
</head>

<body class="login-page">

<nav>
    <div class="logo">
        <img src="logo.png">
        <span class="logo-text">धनलक्ष्मी कृषी केंद्र</span>
    </div>
</nav>

<div class="login-main">
    <div class="login-card">
        <h2>Create Account</h2>
        <p class="helper">Please enter your full name (as per your ID) to avoid order issues.</p>
<form id="signupForm">
  <h3>New User</h3>
  <input id="name" placeholder="Name" />
  <input id="mobile" placeholder="Mobile" />
  <div class="password-field">
    <input id="password" type="password" placeholder="Password" class="password-input" />
    <button type="button" class="password-toggle" id="toggle-signup-password" aria-label="Show password">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"></path>
        <circle cx="12" cy="12" r="3.2"></circle>
      </svg>
      <span class="toggle-text">Show</span>
    </button>
  </div>
  <button>Sign Up</button>
  <p class="helper">
            Already registered?
            <a href="login.html">Login</a>
  </p>
</form>

<script src="signup.js"></script>
        


        
    </div>
</div>

<footer>© 2025 Dhanalaxmi Krushi Kendra</footer>

</body>
</html>
