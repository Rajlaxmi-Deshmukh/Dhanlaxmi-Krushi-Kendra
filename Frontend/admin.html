<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    
    <link rel="icon" type="image/png" href="logo.png">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="admin-page" onload="loadAdminProducts(); loadAdminOrders(); loadAdminDashboard(); loadAdminUsers();">
<nav>
  <div class="logo">
    <img src="logo.png">
    <span class="logo-text">Admin Dashboard</span>
  </div>
  <ul>
    <li><a href="admin.html">Dashboard</a></li>
    <li class="admin-notification-nav">
      <button id="admin-notification-btn" class="admin-bell-btn" type="button" onclick="toggleAdminNotifications()">
        &#128276;
        <span id="admin-notification-count" class="admin-bell-count" style="display:none;">0</span>
      </button>
    </li>
    <li class="nav-right"><a href="#" onclick="adminLogout()">Logout</a></li>
  </ul>
</nav>

<section class="admin-main">
  <div class="admin-grid">
    <div class="admin-card admin-nav-card" data-target="users-section">
      <strong id="users"></strong>
      <p>Users</p>
    </div>
    <div class="admin-card admin-nav-card" data-target="products-section">
      <strong id="products"></strong>
      <p>Products</p>
    </div>
    <div class="admin-card admin-nav-card" data-target="orders-section">
      <strong id="ordersCount"></strong>
      <p>Orders</p>
    </div>
    <div class="admin-card">
      <strong>&#8377;<span id="revenue"></span></strong>
      <p>Revenue</p>
    </div>
  </div>
</section>

<section class="admin-main">
  <h2 class="section-title">Add Product</h2>
  <form id="productForm" class="admin-form" enctype="multipart/form-data">
    <input name="name" placeholder="Product name" required />
    <input name="price" type="number" placeholder="Price" required />
    <input name="quantity" type="number" placeholder="Quantity" required />
    <select name="category" required>
      <option value="herbicide">Herbicide</option>
      <option value="fertilizer">Fertilizer</option>
      <option value="pesticide">Pesticide</option>
    </select>
    <input type="file" name="image" accept="image/*" required />
    <button class="btn-primary" type="submit">Add Product</button>
  </form>
</section>

<section class="admin-main" id="products-section">
  <h2 class="section-title">Products</h2>
  <div id="admin-products" class="admin-products"></div>
</section>

<section class="admin-main" id="orders-section">
  <h2 class="section-title">Orders</h2>
  <div class="admin-table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>User</th>
          <th>Status</th>
          <th>Payment</th>
          <th>Products</th>
          <th>Total</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="orders"></tbody>
    </table>
  </div>
</section>

<section class="admin-main" id="users-section">
  <h2 class="section-title">Users</h2>
  <div class="admin-table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Mobile</th>
          <th>Role</th>
        </tr>
      </thead>
      <tbody id="admin-users"></tbody>
    </table>
  </div>
</section>

<div id="admin-notification-modal" class="admin-notification-modal" style="display:none;">
  <div class="admin-notification-modal-card">
    <div class="admin-notification-modal-head">
      <h3>Notifications</h3>
      <button type="button" class="admin-notification-close" onclick="closeAdminNotifications()">&times;</button>
    </div>
    <div class="admin-notification-toolbar">
      <button class="btn-primary" type="button" onclick="markAllAdminNotificationsRead()">Mark All Read</button>
    </div>
    <div id="admin-notification-list" class="admin-notification-list"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
<script src="script.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    startOrdersSse();
    loadAdminNotifications();
    setInterval(loadAdminNotifications, 10000);
  });
</script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const token = localStorage.getItem("token") || sessionStorage.getItem("token");
    const role = localStorage.getItem("role") || sessionStorage.getItem("role");
    if (!token || role !== "admin") {
      window.location.href = "admin-login.html";
    }
  });
</script>
</body>
</html>
