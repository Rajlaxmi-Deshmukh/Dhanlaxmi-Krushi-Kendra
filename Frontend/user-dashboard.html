<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
  <div class="logo">
    <img src="logo.png">
    <span class="logo-text">Dhanalaxmi Krushi Kendra</span>
  </div>
  <ul>
    <li><a href="home.html">Home</a></li>
    <li><a href="products.html">Products</a></li>
    <li><a href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>
    <li id="orders-link" style="display:none;"><a href="orders.html">My Orders</a></li>
    <li><a href="aboutus.html">About</a></li>
    <li><a href="schedule.html">Contact Us</a></li>
    <li id="profile-link" style="display:none;"><a href="user-dashboard.html">Profile</a></li>
    <li id="logout-link" class="nav-right" style="display:none;"><a href="#" onclick="logout()">Logout</a></li>
    <li><a id="login-link" href="login.html">Login</a></li>
  </ul>
</nav>

<section class="profile-header">
  <div class="profile-header-main">
    <div class="profile-avatar">U</div>
    <div class="profile-info">
      <h2 id="profile-name">User</h2>
      <p id="profile-mobile"></p>
    </div>
  </div>
  <div class="profile-actions">
    <button class="btn-primary" onclick="window.location.href='products.html'">Continue Shopping</button>
    <button class="btn-primary" onclick="window.location.href='cart.html'">View Cart</button>
  </div>
</section>

<section class="orders-section">
  <h2>My Orders</h2>
  <div class="order-filters">
    <button class="tab active" data-filter="all">All</button>
    <button class="tab" data-filter="pending">Pending</button>
    <button class="tab" data-filter="approved">Approved</button>
    <button class="tab" data-filter="cancelled">Cancelled</button>
    <button class="tab" data-filter="paid">Paid</button>
  </div>
  <div id="orders-empty" class="empty-state" style="display:none;">No orders yet.</div>
  <div id="my-orders"></div>
</section>

<footer>&copy; 2025 Dhanalaxmi Krushi Kendra</footer>
<script src="script.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    startOrdersSse();
  });
</script>
</body>
</html>
